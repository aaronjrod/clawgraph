<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClawGraph | Command Center HUD</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-darker: #010409;
            --bg-main: #0d1117;
            --sidebar-bg: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --text-dim: #8b949e;
            --accent: #58a6ff;
            --success: #3fb950;
            --warning: #d29922;
            --danger: #f85149;
            --purple: #bc8cff;
            --orange: #ffa657;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-darker);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Minimal Scrollbars */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        /* Layout Structure */
        .sidebar-left,
        .sidebar-right {
            width: 300px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .sidebar-right {
            width: 380px;
            border-right: none;
            border-left: 1px solid var(--border);
        }

        /* Custom Resizer Handle */
        .resizer {
            width: 6px;
            cursor: col-resize;
            background: transparent;
            z-index: 20;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .resizer:hover,
        .resizer.resizing {
            background: var(--accent);
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-main);
            overflow-y: auto;
            position: relative;
        }

        /* Headers */
        .panel-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
        }

        .panel-header h2 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
            color: #fff;
        }

        /* --- LEFT: DOCUMENTS --- */
        .doc-list {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
        }

        .doc-item {
            padding: 12px;
            border-radius: 6px;
            border: 1px solid transparent;
            margin-bottom: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .doc-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--border);
        }

        .doc-name {
            display: block;
            margin-bottom: 4px;
            color: var(--text);
            font-weight: 500;
        }

        .doc-meta {
            font-size: 0.7rem;
            color: var(--text-dim);
            display: flex;
            gap: 8px;
        }

        /* Themed Tags for Documents */
        .doc-tag {
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.05);
        }

        .tag-blue {
            color: var(--accent);
            background: rgba(88, 166, 255, 0.1);
        }

        .tag-orange {
            color: var(--orange);
            background: rgba(255, 166, 87, 0.1);
        }

        .tag-green {
            color: var(--success);
            background: rgba(63, 185, 80, 0.1);
        }

        .tag-purple {
            color: var(--purple);
            background: rgba(188, 140, 255, 0.1);
        }

        .upload-btn {
            padding: 12px;
            border-top: 1px solid var(--border);
            text-align: center;
        }

        button.primary {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        /* --- CENTER: WORKERS --- */
        .worker-container {
            padding: 24px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .worker-card {
            background: var(--bg-darker);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
        }

        /* Color Coding Themes */
        .theme-blue {
            border-left: 4px solid var(--accent);
        }

        .theme-orange {
            border-left: 4px solid var(--orange);
        }

        .theme-green {
            border-left: 4px solid var(--success);
        }

        .theme-purple {
            border-left: 4px solid var(--purple);
        }

        .worker-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .worker-title h3 {
            margin: 0;
            font-size: 0.9rem;
            font-weight: 700;
        }

        .theme-blue h3 {
            color: var(--accent);
        }

        .theme-orange h3 {
            color: var(--orange);
        }

        .theme-green h3 {
            color: var(--success);
        }

        .theme-purple h3 {
            color: var(--purple);
        }

        .worker-status {
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(50, 54, 61, 0.5);
            font-weight: bold;
        }

        .activity-block {
            padding: 10px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 4px;
            font-size: 0.8rem;
        }

        .activity-label {
            font-size: 0.65rem;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 5px;
            display: block;
        }

        .activity-content {
            color: var(--text);
            font-weight: bold;
        }

        .steps {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
        }

        /* Connecting Lines (Vertical Tracker) */
        .steps::before {
            content: '';
            position: absolute;
            top: 4px;
            left: 3.5px;
            bottom: 4px;
            width: 1px;
            background: var(--border);
            z-index: 1;
        }

        .step {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            font-size: 0.75rem;
            color: var(--text-dim);
            position: relative;
            z-index: 2;
        }

        .step i {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--bg-darker);
            border: 2px solid var(--border);
            flex-shrink: 0;
            margin-top: 4px;
        }

        .step.done i {
            background: var(--success);
            border-color: var(--success);
            box-shadow: 0 0 5px var(--success);
        }

        .step.active i {
            background: var(--warning);
            border-color: var(--warning);
            animation: pulse 1.5s infinite;
        }

        .step.failed i {
            background: var(--danger);
            border-color: var(--danger);
            box-shadow: 0 0 5px var(--danger);
        }

        .step.done {
            color: var(--text);
            opacity: 0.7;
        }

        .step.active {
            color: #fff;
            opacity: 1;
            font-weight: bold;
        }

        /* Dropdown/Summary styles */
        details {
            width: 100%;
        }

        summary {
            cursor: pointer;
            outline: none;
            list-style: none;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        summary::-webkit-details-marker {
            display: none;
        }

        summary::after {
            content: '▼';
            font-size: 0.5rem;
            opacity: 0.5;
            transition: transform 0.2s;
        }

        details[open] summary::after {
            transform: rotate(180deg);
        }

        .summary-content {
            margin-top: 8px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 4px;
            font-size: 0.7rem;
            line-height: 1.4;
            color: var(--text-dim);
            border-left: 2px solid var(--border);
        }

        .upcoming-list {
            padding-left: 10px;
            margin-top: 5px;
            border-left: 1px dashed var(--border);
        }

        .upcoming-item {
            margin-bottom: 4px;
            font-size: 0.65rem;
        }

        /* Dependency styles */
        .dependency-badge {
            margin-top: 10px;
            padding: 8px;
            background: rgba(255, 166, 87, 0.05);
            border: 1px dashed var(--orange);
            border-radius: 4px;
            font-size: 0.7rem;
        }

        .dep-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            color: var(--orange);
            font-weight: bold;
            display: block;
            margin-bottom: 4px;
        }

        .dep-ref {
            font-weight: bold;
            text-decoration: underline;
            cursor: pointer;
        }

        .dep-ref.blue {
            color: var(--accent);
        }

        .dep-ref.orange {
            color: var(--orange);
        }

        .dep-ref.green {
            color: var(--success);
        }

        .dep-ref.purple {
            color: var(--purple);
        }

        .summary-content.failure {
            background: rgba(248, 81, 73, 0.05);
            border-left: 2px solid var(--danger);
            color: var(--text-dim);
        }

        /* --- RIGHT: CHAT --- */
        .chat-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px;
            overflow-y: auto;
            gap: 16px;
        }

        .msg {
            max-width: 85%;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            line-height: 1.4;
        }

        .msg.system {
            background: transparent;
            border: 1px solid var(--border);
            align-self: flex-start;
        }

        .msg.orchestrator {
            background: rgba(88, 166, 255, 0.05);
            border: 1px solid rgba(88, 166, 255, 0.2);
            align-self: flex-start;
        }

        .msg.user {
            background: var(--accent);
            color: #fff;
            align-self: flex-end;
        }

        .msg-sender {
            font-size: 0.65rem;
            font-weight: bold;
            margin-bottom: 4px;
            display: block;
        }

        .msg-sender.orch {
            color: var(--accent);
        }

        .chat-input-area {
            padding: 16px;
            border-top: 1px solid var(--border);
        }

        .chat-input-area input {
            width: 100%;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 14px;
            color: #fff;
            outline: none;
        }

        /* Global UI elements */
        .toggle-group {
            display: flex;
            background: #000;
            border-radius: 6px;
            padding: 2px;
        }

        .toggle-btn {
            background: transparent;
            border: none;
            color: var(--text-dim);
            padding: 4px 10px;
            font-size: 0.65rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(2px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-main);
            border: 1px solid var(--border);
            border-radius: 8px;
            width: 50%;
            min-width: 400px;
            max-width: 800px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            padding: 16px 24px;
            background: var(--bg-darker);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            margin: 0;
            font-size: 1rem;
            color: #fff;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 1.5rem;
            cursor: pointer;
            line-height: 1;
        }

        .modal-close:hover {
            color: #fff;
        }

        .modal-body {
            padding: 1.5rem;
            overflow-y: auto;
            color: var(--text-main);
            line-height: 1.6;
        }

        .modal-body h1,
        .modal-body h2,
        .modal-body h3 {
            color: var(--text-bright);
            margin-top: 1rem;
            margin-bottom: 0.5rem;
        }

        .modal-body ul {
            margin-left: 1.5rem;
            margin-bottom: 1rem;
        }

        .toggle-btn.active {
            background: var(--border);
            color: #fff;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.8;
            }

            50% {
                transform: scale(1.3);
                opacity: 1;
            }

            100% {
                transform: scale(1);
                opacity: 0.8;
            }
        }
    </style>
</head>

<body>

    <!-- LEFT: DOCUMENT MANAGER -->
    <div class="sidebar-left" id="sidebar-left">
        <div class="panel-header">
            <h2>DOCUMENTS</h2>
            <div class="toggle-group" style="background: transparent;">
                <select id="doc-filter" class="toggle-btn active"
                    style="-webkit-appearance: none; appearance: none; text-align: center; outline: none; padding: 4px 12px; cursor: pointer;">
                    <option value="ALL">ALL</option>
                </select>
            </div>
        </div>
        <div class="doc-list" id="doc-list">
            <!-- Dynamic Documents -->
        </div>
    </div>

    <div class="resizer" id="resizer-left"></div>

    <!-- CENTER: ORCHESTRATION HUB -->
    <main>
        <div class="panel-header" style="background: var(--bg-darker)">
            <h2>WORKER ORCHESTRATION</h2>
            <div id="connection-status" style="font-size: 0.7rem; color: var(--success); font-weight: bold">
                CONNECTING...
            </div>
        </div>

        <div class="worker-container" id="worker-container">
            <!-- Dynamic Worker Cards -->
        </div>
    </main>

    <div class="resizer" id="resizer-right"></div>

    <!-- RIGHT: ORCHESTRATOR CHAT -->
    <div class="sidebar-right" id="sidebar-right">
        <div class="panel-header">
            <h2>ORCHESTRATOR</h2>
            <div class="toggle-group" style="background: transparent;">
                <select id="chat-target" class="toggle-btn active"
                    style="-webkit-appearance: none; appearance: none; text-align: center; outline: none; padding: 4px 12px; cursor: pointer;">
                    <option value="SUPER">SUPER</option>
                </select>
            </div>
        </div>
        <div class="chat-view" id="chat-view">
            <!-- Dynamic Chat Logs -->
        </div>
        <div class="chat-input-area">
            <input type="text" placeholder="Type a message...">
        </div>
    </div>

    <!-- Document Modal -->
    <div class="modal-overlay" id="doc-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Document Preview</h3>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body" id="modal-body">
                Loading...
            </div>
        </div>
    </div>

    <script>
        const workerContainer = document.getElementById('worker-container');
        const docList = document.getElementById('doc-list');
        const chatView = document.getElementById('chat-view');
        const statusEl = document.getElementById('connection-status');

        const themes = {
            'clinical_regulatory': 'theme-purple',
            'cmc_regulatory': 'theme-orange',
            'clinical_ops': 'theme-blue',
            'reg_ops': 'theme-green',
            'strategy_labeling': 'theme-purple',
            'marketing': 'theme-blue'
        };

        const tagThemes = {
            'clinical_regulatory': 'tag-purple',
            'cmc_regulatory': 'tag-orange',
            'clinical_ops': 'tag-blue',
            'reg_ops': 'tag-green',
            'strategy_labeling': 'tag-orange',
            'marketing': 'tag-blue'
        };

        async function fetchSnapshot() {
            try {
                const res = await fetch('/api/snapshot');
                if (!res.ok) throw new Error("Offline");
                const data = await res.json();

                statusEl.textContent = 'SYSTEM STATUS: OPERATIONAL';
                statusEl.style.color = 'var(--success)';
                if (data.bags) {
                    updateFilterOptions(data.bags);
                    renderDocuments(data.documents);
                    renderBags(data.bags);
                }
                if (data.chat_log) {
                    renderChat(data.chat_log);
                }

                // Re-setup input listeners in case DOM was refreshed
                setupChatInput();
            } catch (err) {
                statusEl.textContent = 'SYSTEM STATUS: DISCONNECTED';
                statusEl.style.color = 'var(--danger)';
            }
        }

        let knownBags = new Set();
        const docFilter = document.getElementById('doc-filter');
        const chatTarget = document.getElementById('chat-target');

        docFilter.addEventListener('change', () => fetchSnapshot());

        function updateFilterOptions(bags) {
            bags.forEach(bag => {
                if (!knownBags.has(bag.name)) {
                    knownBags.add(bag.name);
                    const opt1 = document.createElement('option');
                    opt1.value = bag.name;
                    opt1.textContent = bag.name.toUpperCase();
                    docFilter.appendChild(opt1);

                    const opt2 = document.createElement('option');
                    opt2.value = bag.name;
                    opt2.textContent = bag.name.toUpperCase();
                    chatTarget.appendChild(opt2);
                }
            });
        }

        function renderDocuments(docs) {
            docList.innerHTML = '';
            const filterValue = docFilter.value;
            Object.values(docs).forEach(doc => {
                if (filterValue !== 'ALL' && doc.domain !== filterValue) return;

                const item = document.createElement('div');
                item.className = 'doc-item';
                item.style.cursor = 'pointer'; // indicate clickable
                const tagTheme = tagThemes[doc.domain] || '';

                // Add version tags
                const version = doc.version || 'v1.0';

                item.innerHTML = `
                    <span class="doc-name">${doc.uri.split('/').pop()}</span>
                    <div class="doc-meta" style="justify-content: space-between; width: 100%">
                        <div>
                            <span class="doc-tag ${tagTheme}">${doc.domain || 'Global'}</span>
                            <span>Artifact</span>
                        </div>
                        <span style="font-size: 0.65rem; color: var(--text-dim)">${version}</span>
                    </div>
                `;

                // Add click listener for preview
                item.addEventListener('click', () => openModal(doc.uri));

                docList.appendChild(item);
            });
        }

        async function openModal(uri) {
            const modal = document.getElementById('doc-modal');
            const title = document.getElementById('modal-title');
            const body = document.getElementById('modal-body');

            modal.classList.add('active');
            title.textContent = uri.split('/').pop();
            body.textContent = 'Loading...';

            try {
                const res = await fetch('/api/documents/' + encodeURIComponent(uri));
                if (!res.ok) throw new Error("Failed to load");
                const data = await res.json();
                body.innerHTML = marked.parse(data.content);
            } catch (e) {
                body.textContent = 'Error loading document preview.';
            }
        }

        function closeModal() {
            document.getElementById('doc-modal').classList.remove('active');
        }

        // Close modal when pressing ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // Close modal when clicking on the darkened overlay (outside the card)
        document.getElementById('doc-modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('doc-modal')) {
                closeModal();
            }
        });

        function renderBags(bags) {
            // Preserve open <details> state
            const openDetails = new Set();
            document.querySelectorAll('details[open]').forEach(el => {
                const summary = el.querySelector('summary');
                if (summary) openDetails.add(summary.textContent.trim());
            });

            workerContainer.innerHTML = '';
            bags.forEach(bag => {
                const theme = themes[bag.name] || 'theme-blue';
                const card = document.createElement('div');
                card.className = `worker-card ${theme}`;

                const activeNode = bag.nodes.find(n => n.status === 'RUNNING');
                const lastNode = bag.nodes.slice().reverse().find(n => n.status !== 'PENDING' && n.status !== 'RUNNING');

                let activityHtml = '';
                if (activeNode) {
                    activityHtml = `
                        <div class="activity-block">
                            <span class="activity-label">Active Agent</span>
                            <div class="activity-content">${activeNode.name}</div>
                        </div>
                    `;
                } else if (lastNode) {
                    activityHtml = `
                        <div class="activity-block">
                            <span class="activity-label">Last Agent</span>
                            <div class="activity-content">${lastNode.name}</div>
                        </div>
                    `;
                }

                // Deduplicate events so we only show the latest state per node in the visual timeline
                const nodeEvents = new Map();
                bag.timeline.forEach(event => {
                    if (event.node_id) {
                        nodeEvents.set(event.node_id, event);
                    }
                });
                const uniqueSteps = Array.from(nodeEvents.values());

                let stepsHtml = uniqueSteps.map((event, idx) => {
                    const signal = event.signal;
                    const orchStatus = event.metadata?.orchestrator_status;

                    const statusClass = signal === 'DONE' ? 'done' :
                        (signal === 'FAILED' || signal === 'NEED_INTERVENTION') ? 'failed' :
                            (signal === 'STALLED' || signal === 'HOLD_FOR_HUMAN' || signal === 'NEED_INFO' || orchStatus === 'RUNNING' || orchStatus === 'STALLED') ? 'active' : '';

                    return `
                        <li class="step ${statusClass}">
                            <i></i>
                            <details>
                                <summary>${event.node_id || 'System'}</summary>
                                <div class="summary-content ${event.signal === 'FAILED' ? 'failure' : ''}">
                                    ${event.summary || 'Executing...'}
                                </div>
                            </details>
                        </li>
                    `;
                }).join('');

                card.innerHTML = `
                    <div class="worker-title">
                        <h3>${bag.name.replace('_', ' ').toUpperCase()}</h3>
                        <span class="worker-status" style="color: var(--${bag.status === 'RUNNING' ? 'warning' :
                        bag.status === 'SUSPENDED' ? 'purple' :
                            bag.status === 'STALLED' ? 'orange' :
                                bag.status === 'FAILED' ? 'danger' :
                                    bag.status === 'DONE' ? 'success' : 'text-dim'
                    })">
                            ${bag.status}
                        </span>
                    </div>
                    ${activityHtml}
                    <ul class="steps">
                        ${stepsHtml}
                    </ul>
                `;
                workerContainer.appendChild(card);
            });

            // Restore open <details> state
            document.querySelectorAll('details').forEach(el => {
                const summary = el.querySelector('summary');
                if (summary && openDetails.has(summary.textContent.trim())) {
                    el.open = true;
                }
            });
        }

        function setupChatInput() {
            const input = document.querySelector('.chat-input-area input');
            if (!input || input.dataset.listenerAttached) return;

            input.addEventListener('keypress', async (e) => {
                if (e.key === 'Enter' && input.value.trim() !== '') {
                    const text = input.value.trim();
                    input.value = ''; // clear immediately for UX

                    try {
                        let target = chatTarget.value;
                        let textObj = target === 'SUPER' ? text : `[TO: ${target.toUpperCase()}] ${text}`;
                        await fetch('/api/chat', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                sender: 'HUMAN',
                                text: textObj
                            })
                        });
                        fetchSnapshot(); // immediately trigger a refresh
                    } catch (error) {
                        console.error('Error sending chat:', error);
                    }
                }
            });
            input.dataset.listenerAttached = 'true';
        }

        let lastChatLength = -1;
        function renderChat(chatLogs) {
            if (chatLogs.length === lastChatLength) return;
            lastChatLength = chatLogs.length;

            chatView.innerHTML = '';

            // Strictly sort by timestamp to handle timezone mismatches between python naive datetimes and UTC 
            let sortedLogs = [...chatLogs].sort((a, b) => new Date(a.timestamp).getTime() - new Date(b.timestamp).getTime());

            // Render bottom 20 messages to prevent infinite scrolling
            sortedLogs.slice(-20).forEach(log => {
                const msg = document.createElement('div');

                if (log.sender === 'HUMAN') {
                    msg.className = 'msg text-warning';
                } else if (log.sender === 'SUPER-ORCHESTRATOR') {
                    msg.className = 'msg text-purple';
                } else {
                    msg.className = 'msg orchestrator';
                }

                const timestamp = new Date(log.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

                msg.innerHTML = `
                    <span class="msg-sender orch" style="color: inherit">${log.sender}</span>
                    <span style="font-size: 0.7em; opacity: 0.7">[${timestamp}]</span> 
                    ${log.text}
                `;
                chatView.appendChild(msg);
            });
            chatView.scrollTop = chatView.scrollHeight;
        }

        // --- Interactivity and Resizing handlers ---
        function initResizers() {
            function makeResizable(resizerId, sidebarId, isLeft) {
                const resizer = document.getElementById(resizerId);
                const sidebar = document.getElementById(sidebarId);
                let isResizing = false;

                resizer.addEventListener('mousedown', (e) => {
                    isResizing = true;
                    resizer.classList.add('resizing');
                    document.body.style.cursor = 'col-resize';
                    e.preventDefault();
                });

                document.addEventListener('mousemove', (e) => {
                    if (!isResizing) return;
                    if (isLeft) {
                        const newWidth = e.clientX;
                        if (newWidth > 200 && newWidth < Math.min(600, window.innerWidth / 2)) {
                            sidebar.style.width = newWidth + 'px';
                        }
                    } else {
                        const newWidth = document.body.clientWidth - e.clientX;
                        if (newWidth > 200 && newWidth < Math.min(600, window.innerWidth / 2)) {
                            sidebar.style.width = newWidth + 'px';
                        }
                    }
                });

                document.addEventListener('mouseup', () => {
                    if (isResizing) {
                        isResizing = false;
                        resizer.classList.remove('resizing');
                        document.body.style.cursor = '';
                    }
                });
            }

            makeResizable('resizer-left', 'sidebar-left', true);
            makeResizable('resizer-right', 'sidebar-right', false);
        }

        initResizers();
        setInterval(fetchSnapshot, 1000);
        fetchSnapshot();
    </script>
</body>
