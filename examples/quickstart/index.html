<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClawGraph | Live Integration HUD</title>
    <style>
        :root {
            --bg-darker: #010409;
            --bg-main: #0d1117;
            --sidebar-bg: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --text-dim: #8b949e;
            --accent: #58a6ff;
            --success: #3fb950;
            --warning: #d29922;
            --danger: #f85149;
            --purple: #bc8cff;
            --orange: #ffa657;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-darker);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-main);
            overflow-y: auto;
            padding: 24px;
        }

        .panel-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            margin-bottom: 24px;
        }

        .panel-header h2 {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
            color: #fff;
        }

        .worker-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }

        .worker-card {
            background: var(--sidebar-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border-left: 4px solid var(--accent);
        }

        .worker-card.status-WORKING {
            border-left-color: var(--warning);
        }

        .worker-card.status-DONE {
            border-left-color: var(--success);
        }

        .worker-card.status-FAILED {
            border-left-color: var(--danger);
        }

        .worker-card.status-PENDING {
            border-left-color: var(--text-dim);
        }

        .worker-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .worker-title h3 {
            margin: 0;
            font-size: 1rem;
            font-weight: 700;
        }

        .worker-status {
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 4px;
            background: rgba(50, 54, 61, 0.5);
            font-weight: bold;
        }

        .status-WORKING .worker-status {
            color: var(--warning);
            animation: pulse 1.5s infinite;
        }

        .status-DONE .worker-status {
            color: var(--success);
        }

        .status-FAILED .worker-status {
            color: var(--danger);
        }

        .status-PENDING .worker-status {
            color: var(--text-dim);
        }

        .activity-block {
            padding: 10px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 4px;
            font-size: 0.85rem;
        }

        .activity-label {
            font-size: 0.70rem;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 5px;
            display: block;
        }

        .activity-content {
            color: var(--text);
            font-weight: bold;
            word-break: break-all;
        }

        @keyframes pulse {
            0% {
                opacity: 0.8;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.8;
            }
        }
    </style>
</head>

<body>

    <main>
        <div class="panel-header">
            <h2>CLAWGRAPH LIVE INTEGRATION</h2>
            <div id="connection-status" style="font-size: 0.85rem; color: var(--success); font-weight: bold;">
                CONNECTING...
            </div>
        </div>

        <div class="worker-container" id="nodes-container">
            <!-- Nodes will be injected here -->
        </div>
    </main>

    <script>
        const container = document.getElementById('nodes-container');
        const statusEl = document.getElementById('connection-status');

        async function fetchSnapshot() {
            try {
                const res = await fetch('/api/snapshot');
                if (!res.ok) throw new Error("Network response was not ok");
                const data = await res.json();

                statusEl.textContent = 'LIVE';
                statusEl.style.color = 'var(--success)';

                renderNodes(data.nodes);
            } catch (err) {
                statusEl.textContent = 'DISCONNECTED';
                statusEl.style.color = 'var(--danger)';
            }
        }

        function renderNodes(nodes) {
            container.innerHTML = '';
            nodes.forEach(node => {
                const card = document.createElement('div');
                card.className = `worker-card status-${node.status}`;

                let summaryHtml = node.summary ?
                    `<div class="activity-block">
                        <span class="activity-label">Latest Summary</span>
                        <div class="activity-content">${node.summary}</div>
                    </div>` : '';

                let signalHtml = node.last_signal ?
                    `<div class="activity-block">
                        <span class="activity-label">Last Signal</span>
                        <div class="activity-content">${node.last_signal}</div>
                    </div>` : '';

                card.innerHTML = `
                    <div class="worker-title">
                        <h3>${node.name}</h3>
                        <span class="worker-status">${node.status}</span>
                    </div>
                    ${signalHtml}
                    ${summaryHtml}
                `;
                container.appendChild(card);
            });
        }

        // Poll every 1 second
        setInterval(fetchSnapshot, 1000);
        fetchSnapshot(); // Initial fetch
    </script>
</body>

</html>
