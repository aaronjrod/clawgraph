name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up uv
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: true
        cache-dependency-glob: "pyproject.toml"
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        uv pip install --system -e ".[dev]"
    - name: Lint with Ruff
      run: |
        ruff check .
        ruff format --check .
    - name: Type check with mypy
      run: |
        mypy clawgraph
    - name: Test with pytest
      run: |
        pytest --cov=clawgraph --cov-report=term --cov-report=xml tests/
    - name: Generate Coverage Badge
      if: matrix.python-version == '3.12'
      run: |
        uv run python -m coverage json
        COVERAGE=$(uv run python -c "import json; print(json.load(open('coverage.json'))['totals']['percent_covered_display'])")
        COLOR=$(uv run python -c "c=int('$COVERAGE'); print('4c1' if c>=90 else 'dfb317' if c>=80 else 'e05d44')")
        cat <<EOF > coverage.svg
        <svg xmlns="http://www.w3.org/2000/svg" width="104" height="20">
          <linearGradient id="b" x2="0" y2="100%"><stop offset="0" stop-color="#bbb" stop-opacity=".1"/><stop offset="1" stop-opacity=".1"/></linearGradient>
          <mask id="a"><rect width="104" height="20" rx="3" fill="#fff"/></mask>
          <g mask="url(#a)"><path fill="#555" d="M0 0h67v20H0z"/><path fill="#$COLOR" d="M67 0h37v20H67z"/><path fill="url(#b)" d="M0 0h104v20H0z"/></g>
          <g fill="#fff" text-anchor="middle" font-family="DejaVu Sans,Verdana,Geneva,sans-serif" font-size="11">
            <text x="33.5" y="15" fill="#010101" fill-opacity=".3">coverage</text>
            <text x="33.5" y="14">coverage</text>
            <text x="84.5" y="15" fill="#010101" fill-opacity=".3">$COVERAGE%</text>
            <text x="84.5" y="14">$COVERAGE%</text>
          </g>
        </svg>
        EOF
    - name: Commit Coverage Badge
      if: matrix.python-version == '3.12'
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "docs(coverage): update coverage badge"
        file_pattern: coverage.svg
